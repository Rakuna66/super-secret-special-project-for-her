<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="For You ♪"/>
<meta name="theme-color" content="#FFB3C6"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>💖 A Playlist For You</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --pink:     #FFB3C6;
  --lavender: #C9B8E8;
  --mint:     #B8E8D0;
  --peach:    #FFD6B3;
  --cream:    #FFF5F9;
  --navy:     #1A1A2E;
  --gray:     #8B7FA8;
  --white:    #FFFFFF;
  --px: 'Press Start 2P', monospace;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--cream);
  font-family: var(--px);
  background-image:
    linear-gradient(rgba(201,184,232,0.15) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,184,232,0.15) 1px, transparent 1px);
  background-size: 16px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Layout shell ── */
.shell {
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 460px;
  height: 100dvh;
  max-height: 800px;
  background: var(--white);
  border: 3px solid var(--navy);
  box-shadow: 6px 6px 0 var(--navy);
  position: relative;
  overflow: hidden;
}

/* ── Title bar ── */
.titlebar {
  background: linear-gradient(90deg, var(--lavender), var(--pink));
  border-bottom: 3px solid var(--navy);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.titlebar-title { font-size: 9px; color: var(--navy); letter-spacing: 1px; }
.dots { display: flex; gap: 5px; }
.dot { width: 10px; height: 10px; border: 2px solid var(--navy); }
.dot-r { background: #FF6B8A; }
.dot-y { background: #FFD166; }
.dot-g { background: #80EFC0; }

/* ── Photo panel ── */
.photo-panel {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  max-height: 220px;
  background: var(--lavender);
  flex-shrink: 0;
  border-bottom: 3px solid var(--navy);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.photo-panel img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  image-rendering: auto;
}
.photo-emoji { font-size: 72px; line-height: 1; }

/* pixel scanline overlay */
.photo-panel::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.04) 0px,
    rgba(0,0,0,0.04) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
}

/* ── Song info ── */
.song-info {
  padding: 10px 14px 6px;
  background: var(--cream);
  border-bottom: 2px solid var(--navy);
  flex-shrink: 0;
}
.song-title  { font-size: 11px; color: var(--navy); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-artist { font-size: 8px; color: var(--gray); margin-bottom: 6px; }
.song-why {
  font-size: 8px; color: #6B5B95; line-height: 1.9;
  border-left: 3px solid var(--lavender); padding-left: 8px;
  font-family: Georgia, serif; font-style: italic;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
  cursor: pointer;
}
.song-why.expanded { -webkit-line-clamp: unset; }

/* ── Visualizer ── */
.viz-wrap {
  background: var(--navy);
  height: 60px;
  border-bottom: 3px solid var(--navy);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
canvas { width: 100%; height: 100%; display: block; }
.viz-idle {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; color: var(--gray); letter-spacing: 1px;
  pointer-events: none;
}

/* ── Progress ── */
.progress-section {
  padding: 8px 14px 2px;
  background: var(--cream);
  border-bottom: 2px solid var(--navy);
  flex-shrink: 0;
}
.progress-track {
  width: 100%; height: 10px;
  background: var(--white); border: 2px solid var(--navy);
  cursor: pointer; position: relative; touch-action: none;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink), var(--lavender));
  width: 0%; pointer-events: none;
}
.time-row {
  display: flex; justify-content: space-between;
  margin-top: 3px; font-size: 8px; color: var(--gray);
}

/* ── Controls ── */
.controls {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; padding: 10px 14px;
  background: var(--cream); border-bottom: 3px solid var(--navy);
  flex-shrink: 0;
}
.ctrl-btn {
  background: var(--white); border: 2px solid var(--navy);
  box-shadow: 2px 2px 0 var(--navy);
  padding: 8px 12px; font-family: var(--px);
  font-size: 10px; color: var(--navy); cursor: pointer;
  line-height: 1; transition: transform 0.05s, box-shadow 0.05s;
  touch-action: manipulation;
}
.ctrl-btn:active { transform: translate(2px,2px); box-shadow: none; }
.ctrl-btn.play { background: var(--lavender); padding: 10px 18px; font-size: 14px; }
.ctrl-btn:hover { background: var(--pink); }

/* Volume */
.vol-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px 8px; background: var(--cream);
  border-bottom: 3px solid var(--navy); flex-shrink: 0;
}
.vol-label { font-size: 8px; color: var(--gray); }
input[type=range] {
  -webkit-appearance: none; flex: 1;
  height: 8px; background: var(--white);
  border: 2px solid var(--navy); outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  background: var(--pink); border: 2px solid var(--navy);
  border-radius: 0; cursor: pointer;
}

/* ── Playlist ── */
.playlist {
  flex: 1; min-height: 0; overflow-y: auto; background: var(--white);
  -webkit-overflow-scrolling: touch;
}
.playlist::-webkit-scrollbar { width: 6px; }
.playlist::-webkit-scrollbar-track { background: var(--cream); }
.playlist::-webkit-scrollbar-thumb { background: var(--lavender); border: 1px solid var(--navy); }

.pl-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-bottom: 2px solid #eee;
  cursor: pointer; touch-action: manipulation;
}
.pl-item:active { background: var(--cream); }
.pl-item.active { background: linear-gradient(90deg, rgba(255,179,198,0.25), rgba(201,184,232,0.25)); }
.pl-num  { font-size: 8px; color: var(--gray); min-width: 18px; }
.pl-info { flex: 1; min-width: 0; }
.pl-name { font-size: 8px; color: var(--navy); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pl-artist { font-size: 7px; color: var(--gray); }
.pl-dur  { font-size: 7px; color: var(--gray); white-space: nowrap; }

/* ── Why modal (full note) ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(26,26,46,0.7);
  display: none; align-items: center; justify-content: center;
  z-index: 100; padding: 24px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--cream); border: 3px solid var(--navy);
  box-shadow: 6px 6px 0 var(--navy); padding: 20px;
  max-width: 360px; width: 100%;
}
.modal-title { font-size: 10px; color: var(--navy); margin-bottom: 4px; }
.modal-artist { font-size: 8px; color: var(--gray); margin-bottom: 14px; }
.modal-label { font-size: 8px; color: var(--gray); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
.modal-why {
  font-size: 7px; color: #6B5B95; line-height: 2;
  border-left: 3px solid var(--lavender); padding-left: 10px;
  font-family: Georgia, serif; font-style: italic;
}
.modal-close {
  margin-top: 16px; font-family: var(--px); font-size: 7px;
  background: var(--pink); border: 2px solid var(--navy);
  box-shadow: 2px 2px 0 var(--navy); padding: 8px 14px;
  cursor: pointer; color: var(--navy); display: block; width: 100%; text-align: center;
}
.modal-close:active { transform: translate(2px,2px); box-shadow: none; }
</style>
</head>
<body>

<!-- Why modal -->
<div class="modal-overlay" id="whyModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-artist" id="modalArtist"></div>
    <div class="modal-label">Why this song ♡</div>
    <div class="modal-why" id="modalWhy"></div>
    <button class="modal-close" id="modalClose">CLOSE ✕</button>
  </div>
</div>

<div class="shell">
  <!-- Title bar -->
  <div class="titlebar">
    <div class="dots">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
    </div>
    <div class="titlebar-title">💖 A PLAYLIST FOR YOU</div>
    <div style="width:37px"></div>
  </div>

  <!-- Photo -->
  <div class="photo-panel" id="photoPanel">
    <div class="photo-emoji" id="photoEmoji">🌸</div>
    <img id="photoImg" src="" alt="" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:cover;"/>
  </div>

  <!-- Song info -->
  <div class="song-info">
    <div class="song-title"  id="songTitle">Select a song ♪</div>
    <div class="song-artist" id="songArtist"></div>
    <div class="song-why"    id="songWhy">Tap a track below to begin ♡</div>
  </div>

  <!-- Visualizer -->
  <div class="viz-wrap">
    <canvas id="viz"></canvas>
    <div class="viz-idle" id="vizIdle">PRESS PLAY ♪</div>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="time-row">
      <span id="timeEl">0:00</span>
      <span id="durEl">--:--</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn" id="prevBtn">◀◀</button>
    <button class="ctrl-btn play" id="playBtn">▶</button>
    <button class="ctrl-btn" id="nextBtn">▶▶</button>
  </div>

  <!-- Volume -->
  <div class="vol-row">
    <span class="vol-label">VOL</span>
    <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8"/>
  </div>

  <!-- Playlist -->
  <div class="playlist" id="playlist"></div>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
// ═══════════════════════════════════════════════
//  ✏️  YOUR SONGS — fill this in!
//
//  src:   "songs/filename.mp3"
//         Upload your MP3s to the songs/ folder
//
//  photo: "photos/filename.jpg"
//         Upload photos of you two to photos/
//         Leave as "" to show the emoji instead
//
//  why:   Your personal note — make her cry 💖
// ═══════════════════════════════════════════════
const songs = [
  {
    title:  "fishies for my love",
    artist: "Artist Name",
    src:    "songs/fishies_for_my_love.mp3",
    photo:  "photos/fishies_for_my_love.jpeg",
    emoji:  "",
    why:    "This song reminds me of that rainy afternoon we spent cooking together, laughing at absolutely nothing. It felt like the whole world was just us."
  },
  {
    title:  "writing code in my heart",
    artist: "Artist Name",
    src:    "songs/writing_code_in_my_heart.mp3",
    photo:  "photos/writing_code_in_my_heart.jpg",
    emoji:  "",
    why:    "Every time this comes on I think of your laugh. The one you try to hide but can't."
  },
  {
    title:  "cozy art",
    artist: "Artist Name",
    src:    "songs/cozy_art.mp3",
    photo:  "photos/cozy_art.jpeg",
    emoji:  "",
    why:    "This was playing the first time I realized how incredibly lucky I am to have you."
  },
  {
    title:  "pibby's mom",
    artist: "Artist Name",
    src:    "songs/pibbys_mom.mp3",
    photo:  "photos/pibbys_mom.jpg",
    emoji:  "",
    why:    "This was playing the first time I realized how incredibly lucky I am to have you."
  },
  {
    title:  "always dreaming, halfway done (ADHD)",
    artist: "Artist Name",
    src:    "songs/always_dreaming_halfway_done.mp3",
    photo:  "photos/always_dreaming_halfway_done.jpg",
    emoji:  "",
    why:    "This was playing the first time I realized how incredibly lucky I am to have you."
  },
  {
    title:  "cutie surrounded by plants",
    artist: "Artist Name",
    src:    "songs/cutie_surrounded_by_plants.mp3",
    photo:  "photos/cutie_surrounded_by_plants.jpeg",
    emoji:  "",
    why:    "This was playing the first time I realized how incredibly lucky I am to have you."
  },
  {
    title:  "expert yapper",
    artist: "Artist Name",
    src:    "songs/expert_yapper.mp3",
    photo:  "photos/expert_yapper.jpeg",
    emoji:  "",
    why:    "This was playing the first time I realized how incredibly lucky I am to have you."
  },
  {
    title:  "thinking about her shimmy",
    artist: "Artist Name",
    src:    "songs/thinking_about_her_shimmy.mp3",
    photo:  "photos/thinking_about_her_shimmy.png",
    emoji:  "",
    why:    "This was playing the first time I realized how incredibly lucky I am to have you."
  },
  {
    title:  "chillin' next to you in bed",
    artist: "Artist Name",
    src:    "songs/chilling_next_to_you_in_bed.mp3",
    photo:  "photos/chilling_next_to_you_in_bed.jpeg",
    emoji:  "",
    why:    "This was playing the first time I realized how incredibly lucky I am to have you."
  },
  {
    title:  "blindbox for my love (all are secret rare)",
    artist: "Artist Name",
    src:    "songs/blindbox_for_my_love.mp3",
    photo:  "photos/blindbox_for_my_love.png",
    emoji:  "",
    why:    "This was playing the first time I realized how incredibly lucky I am to have you."
  },
  {
    title:  "cuddles and headscratches",
    artist: "Artist Name",
    src:    "songs/cuddles_and_headscratches.mp3",
    photo:  "photos/cuddles_and_headscratches.jpg",
    emoji:  "",
    why:    "This was playing the first time I realized how incredibly lucky I am to have you."
  },
];

// ═══════════════════════════════════════════════
//  Player engine
// ═══════════════════════════════════════════════
const audio     = document.getElementById('audio');
const playBtn   = document.getElementById('playBtn');
const prevBtn   = document.getElementById('prevBtn');
const nextBtn   = document.getElementById('nextBtn');
const volSlider = document.getElementById('volSlider');
const pFill     = document.getElementById('progressFill');
const pTrack    = document.getElementById('progressTrack');
const timeEl    = document.getElementById('timeEl');
const durEl     = document.getElementById('durEl');
const songTitle  = document.getElementById('songTitle');
const songArtist = document.getElementById('songArtist');
const songWhy    = document.getElementById('songWhy');
const photoImg   = document.getElementById('photoImg');
const photoEmoji = document.getElementById('photoEmoji');
const vizIdle    = document.getElementById('vizIdle');
const playlistEl = document.getElementById('playlist');

// Modal
const whyModal   = document.getElementById('whyModal');
const modalTitle  = document.getElementById('modalTitle');
const modalArtist = document.getElementById('modalArtist');
const modalWhy    = document.getElementById('modalWhy');
document.getElementById('modalClose').addEventListener('click', () => whyModal.classList.remove('open'));
whyModal.addEventListener('click', e => { if (e.target === whyModal) whyModal.classList.remove('open'); });

songWhy.addEventListener('click', () => {
  const s = songs[currentIndex];
  if (!s) return;
  modalTitle.textContent  = s.title;
  modalArtist.textContent = s.artist;
  modalWhy.textContent    = s.why;
  whyModal.classList.add('open');
});

let currentIndex = 0;
let isPlaying = false;
let audioCtx, analyser, src, dataArray, animId;

const palettes = [
  ['#FFB3C6','#C9B8E8','#B8E8D0','#FFD6B3','#FFB3C6','#C9B8E8'],
  ['#C9B8E8','#B8E8D0','#FFB3C6','#C9B8E8','#FFD6B3','#FFB3C6'],
  ['#B8E8D0','#FFD6B3','#C9B8E8','#FFB3C6','#B8E8D0','#C9B8E8'],
];

// Build playlist
songs.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'pl-item' + (i === 0 ? ' active' : '');
  el.innerHTML = `
    <div class="pl-num">${String(i+1).padStart(2,'0')}</div>
    <div class="pl-info">
      <div class="pl-name">${s.title}</div>
      <div class="pl-artist">${s.artist}</div>
    </div>
    <div class="pl-dur" id="dur-${i}">--:--</div>`;
  el.addEventListener('click', () => loadSong(i, true));
  playlistEl.appendChild(el);
});

function fmt(s) {
  if (!s || isNaN(s)) return '--:--';
  const m = Math.floor(s / 60), ss = Math.floor(s % 60);
  return `${m}:${ss.toString().padStart(2,'0')}`;
}

function setActive(i) {
  document.querySelectorAll('.pl-item').forEach((el, j) => el.classList.toggle('active', j === i));
}

function loadSong(index, autoplay = false) {
  currentIndex = index;
  const s = songs[index];
  audio.src = s.src;
  audio.volume = parseFloat(volSlider.value);
  audio.load();

  songTitle.textContent  = s.title;
  songArtist.textContent = s.artist;
  songWhy.textContent    = s.why;
  songWhy.classList.remove('expanded');

  if (s.photo) {
    photoImg.src = s.photo;
    photoImg.style.display = 'block';
    photoEmoji.style.display = 'none';
  } else {
    photoImg.style.display = 'none';
    photoEmoji.style.display = '';
    photoEmoji.textContent = s.emoji || '🎵';
  }

  pFill.style.width = '0%';
  timeEl.textContent = '0:00';
  durEl.textContent  = '--:--';
  setActive(index);

  // Scroll playlist item into view
  const items = document.querySelectorAll('.pl-item');
  if (items[index]) items[index].scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  if (autoplay) {
    ensureAudioCtx();
    audio.play()
      .then(() => { isPlaying = true; playBtn.textContent = '⏸'; vizIdle.style.display = 'none'; })
      .catch(err => console.warn('Playback blocked:', err));
  }

  // Update media session (lock screen controls)
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title:  s.title,
      artist: s.artist,
      album:  'A Playlist For You 💖',
    });
    navigator.mediaSession.setActionHandler('previoustrack', () => go(-1));
    navigator.mediaSession.setActionHandler('nexttrack',     () => go(1));
    navigator.mediaSession.setActionHandler('play',  () => { audio.play(); isPlaying=true; playBtn.textContent='⏸'; });
    navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); isPlaying=false; playBtn.textContent='▶'; });
  }
}

function go(dir) {
  loadSong((currentIndex + dir + songs.length) % songs.length, isPlaying);
}

function ensureAudioCtx() {
  if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 64;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  const source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  drawViz();
}

// Play / Pause
playBtn.addEventListener('click', () => {
  if (!audio.src || audio.src === window.location.href) { loadSong(0, true); return; }
  ensureAudioCtx();
  if (isPlaying) {
    audio.pause(); isPlaying = false; playBtn.textContent = '▶';
  } else {
    audio.play()
      .then(() => { isPlaying = true; playBtn.textContent = '⏸'; vizIdle.style.display = 'none'; })
      .catch(err => console.warn(err));
  }
});

prevBtn.addEventListener('click', () => go(-1));
nextBtn.addEventListener('click', () => go(1));
audio.addEventListener('ended', () => go(1));

// Progress
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  pFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
  timeEl.textContent = fmt(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => {
  durEl.textContent = fmt(audio.duration);
  const d = document.getElementById(`dur-${currentIndex}`);
  if (d) d.textContent = fmt(audio.duration);
});

// Seek — touch + mouse
function seek(e) {
  if (!audio.duration) return;
  const rect = pTrack.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  audio.currentTime = pct * audio.duration;
}
pTrack.addEventListener('click', seek);
pTrack.addEventListener('touchstart', seek, { passive: true });

// Volume
volSlider.addEventListener('input', () => { audio.volume = parseFloat(volSlider.value); });

// ── Canvas Visualizer ──
const canvas = document.getElementById('viz');
function resizeCanvas() {
  canvas.width  = canvas.offsetWidth  * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawViz() {
  requestAnimationFrame(drawViz);
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1A1A2E';
  ctx.fillRect(0, 0, W, H);
  if (!analyser) return;
  analyser.getByteFrequencyData(dataArray);
  const palette = palettes[currentIndex % palettes.length];
  const count = dataArray.length;
  const barW = Math.floor(W / count);
  const gap = Math.max(1, Math.floor(barW * 0.15));
  const snap = Math.ceil(4 * devicePixelRatio);
  for (let i = 0; i < count; i++) {
    const val = dataArray[i] / 255;
    const barH = Math.max(snap, Math.floor(val * (H - snap) / snap) * snap);
    ctx.fillStyle = palette[i % palette.length];
    ctx.fillRect(i * barW, H - barH, barW - gap, barH);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillRect(i * barW, H - barH, barW - gap, snap);
  }
}
drawViz();

// Load first song (no autoplay — required by browsers)
loadSong(0, false);

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(console.warn);
}
</script>
